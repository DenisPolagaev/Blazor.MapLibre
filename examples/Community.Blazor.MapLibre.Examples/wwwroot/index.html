    <title>Community.Blazor.MapLibre.Examples</title>
    <script>
        // Dynamically set base href depending on whether it's localhost or deployed

        const basePath = isLocalhost ? "/" : "/Blazor.MapLibre/";
        document.write(`<base href="${basePath}">`);

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">

    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="/Community.Blazor.MapLibre.Examples.styles.css" rel="stylesheet" />

    <link href="./_content/MapComparePlugin/maplibre-gl-compare/dist/maplibre-gl-compare.css" rel="stylesheet" />
    <script src="_content/Community.Blazor.MapLibre/maplibre-gl/dist/maplibre-gl.js"></script>
    <script src="_content/MapComparePlugin/maplibre-gl-compare/dist/maplibre-gl-compare.js"></script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />

        <div class="loading-progress-text"></div>
    </div>

        <a class="dismiss">🗙</a>

</html>
